name: build-engine
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container: emscripten/emsdk:3.1.61
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Instalar scons
        run: pip install scons
      - name: Build do engine
        run: |
          cd engine
          # werror=0: o emscripten atual (3.1.61) reporta um warning novo
          # ("linker setting ignored during compilation") para flags de
          # linker (-s MODULARIZE=1 etc.) que o SConstruct do projeto tambem
          # passa nas etapas de compilacao; com werror (padrao do projeto)
          # isso vira erro fatal. werror=0 e uma variavel de build oficial
          # do SConstruct do proprio projeto (BoolVariable 'werror').
          emscons scons -j8 mode=release werror=0
      - name: Coletar artefatos
        run: |
          mkdir -p dist
          cp engine/build/stellarium-web-engine.js engine/build/stellarium-web-engine.wasm dist/
          ls -la dist/
      - name: Copiar pagina do ceu (site/) e catalogos padrao do exemplo do engine
        run: |
          cp -r site/* dist/
          mkdir -p dist/skydata
          cp -r engine/apps/test-skydata/* dist/skydata/
          ls -la dist/
          ls -la dist/skydata/
      - uses: actions/upload-artifact@v4
        with: { name: engine-dist, path: dist/ }
