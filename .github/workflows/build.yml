name: build-engine
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container: emscripten/emsdk:3.1.61
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Instalar scons
        run: pip install --break-system-packages scons
      - name: Build do engine
        run: |
          cd engine
          emscons scons -j8 mode=release
      - name: Coletar artefatos
        run: |
          mkdir -p dist
          cp engine/build/stellarium-web-engine.js engine/build/stellarium-web-engine.wasm dist/
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with: { name: engine-dist, path: dist/ }
